<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ebm</title>

<style>
body {
  margin: 0;
  background: #070708;
  color: #c9c3b5;
  font-family: Helvetica, Arial, sans-serif;
}

canvas {
  position: fixed;
  inset: 0;
}

.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  border-bottom: 1px solid #222;
  background: #09090b;
  z-index: 10;
}

.btn {
  padding: 14px;
  border-right: 1px solid #111;
  background: #0d0d10;
  color: #666;
  cursor: pointer;
}

.btn.active {
  color: #61a979;
}

.readout {
  margin-left: auto;
  padding: 14px;
  color: #61a979;
}

.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #08080a;
  border-top: 1px solid #222;
}

.bottom-header {
  padding: 6px 10px;
  font-size: 11px;
  color: #8f8a7b;
  letter-spacing: .08em;
}

.states {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  height: 110px;
}

.state {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border-right: 1px solid #151515;
  background: #0d0d10;
  color: #777;
  cursor: pointer;
}

.state.active {
  background: #101b14;
  color: #61a979;
}

.state div:first-child {
  font-size: 14px;
}

.state div:last-child {
  font-size: 11px;
  color: #8f8a7b;
}

.speed {
  position: absolute;
  top: 52px;
  left: 120px;
  display: none;
  background: #0d0d10;
  border: 1px solid #222;
}

.speed button {
  padding: 10px;
  background: none;
  border: none;
  color: #777;
  cursor: pointer;
}

.speed button.active {
  color: #61a979;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="topbar">
  <div class="btn" id="audio">audio</div>
  <div class="btn" id="visual">visual</div>

  <div class="speed" id="speed">
    <button data-speed="slow">slow</button>
    <button data-speed="medium" class="active">medium</button>
    <button data-speed="fast">fast</button>
  </div>

  <div class="readout" id="readout">200hz / 202hz — 2hz</div>
</div>

<div class="bottom">
  <div class="bottom-header">bueno brain entrainment</div>
  <div class="states" id="states"></div>
</div>

<script>
const states = [
  { label: "delta", range: [0.5,4] },
  { label: "theta", range: [4,8] },
  { label: "alpha", range: [8,12] },
  { label: "beta", range: [12,30] },
  { label: "gamma", range: [30,50] }
];

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let width, height;
let pointer = { x: 0, y: 0 };

let currentState = states[2];
let visualOn = false;
let speed = 1;

const readout = document.getElementById("readout");
const speedBox = document.getElementById("speed");

function resize(){
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

function getFreq(x,y){
  const left = 50 + (1 - y/height)*300;
  const beat = currentState.range[0] + (x/width)*(currentState.range[1]-currentState.range[0]);
  return { left, right: left+beat, beat };
}

function draw(){
  ctx.fillStyle="#070708";
  ctx.fillRect(0,0,width,height);

  if(visualOn){
    const t = Date.now()/1000;
    const sweep = 0.5 + 0.5*Math.sin(t*speed*2*Math.PI);
    const x = sweep*width;
    const y = height/2;

    const g = ctx.createRadialGradient(x,y,0,x,y,40);
    g.addColorStop(0,"#61a979");
    g.addColorStop(1,"transparent");

    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(x,y,40,0,Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();

canvas.addEventListener("pointermove", e=>{
  pointer = {x:e.clientX,y:e.clientY};
  const f = getFreq(pointer.x,pointer.y);
  readout.innerText = `${f.left.toFixed(1)}hz / ${f.right.toFixed(1)}hz — ${f.beat.toFixed(2)}hz`;
});

document.getElementById("visual").onclick = ()=>{
  visualOn = !visualOn;
  speedBox.style.display = visualOn ? "block" : "none";
};

document.querySelectorAll(".speed button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".speed button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    speed = {slow:0.6,medium:1,fast:1.4}[b.dataset.speed];
  };
});

const statesDiv = document.getElementById("states");

states.forEach((s,i)=>{
  const el = document.createElement("div");
  el.className="state" + (i===2?" active":"");
  el.innerHTML = `<div>${s.label}</div><div>${s.range[0]}–${s.range[1]}hz</div>`;
  el.onclick=()=>{
    document.querySelectorAll(".state").forEach(x=>x.classList.remove("active"));
    el.classList.add("active");
    currentState = s;
  };
  statesDiv.appendChild(el);
});
</script>

</body>
</html>
