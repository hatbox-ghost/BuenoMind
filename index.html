<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>bueno brain entrainment</title>

<style>
:root{
  --accent:#61a979;
  --bg:#070708;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  color:#c9c3b5;
  font-family: Helvetica, Arial, sans-serif;
  overflow:hidden;
}

/* canvas */
canvas{
  position:fixed;
  inset:0;
}

/* TOP BAR (unchanged look) */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  align-items:center;
  border-bottom:1px solid #1a1a1a;
  background:#080809;
  z-index:10;
}

.logo{
  width:64px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid #111;
  color:var(--accent);
  font-weight:700;
}

.btn{
  padding:14px 16px;
  border-right:1px solid #111;
  background:#0d0d10;
  color:#666;
  cursor:pointer;
}

.btn.active{
  color:var(--accent);
  background:#0f1a13;
}

.readout{
  margin-left:auto;
  padding:14px 16px;
  color:var(--accent);
  font-size:13px;
  white-space:nowrap;
}

/* ===== FIXED BOTTOM BAR ===== */

.bottom{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:#08080a;
  border-top:1px solid #1a1a1a;
  z-index:10;
  height:110px;
  display:flex;
  flex-direction:column;
}

.bottom-title{
  font-size:11px;
  letter-spacing:.08em;
  color:#8f8a7b;
  padding:6px 12px;
}

/* KEY FIX */
.states{
  flex:1;
  display:grid;
  grid-template-columns:repeat(5,1fr);
}

/* KEY FIX */
.state{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:3px;
  border-right:1px solid #141414;
  background:#0d0d10;
  color:#777;
  cursor:pointer;
  text-align:center;
  padding:6px 4px;
}

/* KEY FIX */
.state.active{
  background:#101b14;
  color:var(--accent);
}

/* readable sizing */
.state .name{
  font-size:13px;
  font-weight:600;
}

.state .desc{
  font-size:10px;
  color:#8f8a7b;
}

.state .range{
  font-size:10px;
  color:#8f8a7b;
}

/* MOBILE FIX (this is the main change) */
@media (max-width:700px){
  .bottom{
    height:120px;
  }

  .state .name{font-size:12px;}
  .state .desc,
  .state .range{font-size:9px;}

  .readout{
    font-size:12px;
    padding:14px 10px;
  }
}

</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="topbar">
  <div class="logo">ebm</div>
  <div class="btn" id="audio">audio</div>
  <div class="btn" id="visual">visual</div>
  <div class="readout" id="readout"></div>
</div>

<div class="bottom">
  <div class="bottom-title">bueno brain entrainment</div>
  <div class="states" id="states"></div>
</div>

<script>
const states = [
 {label:"delta",desc:"sleep",range:[0.5,4],color:"#3d6ea8"},
 {label:"theta",desc:"dream",range:[4,8],color:"#6a7fc6"},
 {label:"alpha",desc:"calm",range:[8,12],color:"#61a979"},
 {label:"beta",desc:"alert",range:[12,30],color:"#e3a15e"},
 {label:"gamma",desc:"focus",range:[30,50],color:"#d24b5f"}
];

let currentState = states[2];
let pointer = {x:innerWidth/2,y:innerHeight/2};
let locked=false;
let visual=false;

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const readout = document.getElementById("readout");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

function getFreq(x,y){
 const left = 50 + (1-y/innerHeight)*300;
 const beat = currentState.range[0] + (x/innerWidth)*(currentState.range[1]-currentState.range[0]);
 return {left,right:left+beat,beat};
}

function update(){
 const f=getFreq(pointer.x,pointer.y);
 readout.innerText=`${f.left.toFixed(1)}hz / ${f.right.toFixed(1)}hz — ${f.beat.toFixed(2)}hz`;
}

function draw(){
 ctx.fillStyle="#070708";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.strokeStyle=currentState.color;
 ctx.beginPath();
 ctx.arc(pointer.x,pointer.y,15,Math.PI*0.6,Math.PI*1.4);
 ctx.stroke();
 ctx.beginPath();
 ctx.arc(pointer.x,pointer.y,15,Math.PI*1.6,Math.PI*2.4);
 ctx.stroke();

 ctx.beginPath();
 ctx.arc(pointer.x,pointer.y,4,0,Math.PI*2);
 ctx.fill();

 requestAnimationFrame(draw);
}
draw();

/* LOCK SYSTEM (preserved) */
canvas.addEventListener("pointermove",e=>{
 if(locked)return;
 pointer={x:e.clientX,y:e.clientY};
 update();
});

canvas.addEventListener("click",e=>{
 pointer={x:e.clientX,y:e.clientY};
 locked=!locked;
 update();
});

/* STATES */
const statesDiv=document.getElementById("states");

states.forEach((s,i)=>{
 const el=document.createElement("div");
 el.className="state"+(i===2?" active":"");
 el.innerHTML=`
   <div class="name">${s.label}</div>
   <div class="desc">${s.desc}</div>
   <div class="range">${s.range[0]}–${s.range[1]}hz</div>
 `;
 el.onclick=()=>{
   document.querySelectorAll(".state").forEach(x=>x.classList.remove("active"));
   el.classList.add("active");
   currentState=s;
 };
 statesDiv.appendChild(el);
});

update();
</script>

</body>
</html>
